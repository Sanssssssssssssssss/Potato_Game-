<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spud Arena</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./assets/desktop/app-icon-64.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="game-panel">
      <div class="canvas-shell">
        <canvas id="game" width="1280" height="720" aria-label="Spud Arena game canvas"></canvas>
      </div>
      <div class="panel-footer">
        <span id="footer-move"></span>
        <span id="footer-upgrade"></span>
        <span id="footer-fullscreen"></span>
      </div>
    </section>

    <section class="side-rail">
      <article class="hero-copy">
        <p class="eyebrow" id="hero-eyebrow">Arcade Survival</p>
        <h1>Spud Arena</h1>
        <p class="lede" id="hero-lede"></p>
        <div class="feature-list" id="feature-list"></div>
      </article>

      <article class="config-card">
        <div class="section-head">
          <p class="section-kicker" id="config-kicker"></p>
          <h2 id="config-title"></h2>
        </div>

        <div class="config-group">
          <span class="config-label" id="language-label"></span>
          <div class="chip-row">
            <button type="button" class="chip-button" data-language="en">EN</button>
            <button type="button" class="chip-button" data-language="zh">中文</button>
          </div>
        </div>

        <div class="config-group">
          <label class="config-label" for="difficulty-select" id="difficulty-label"></label>
          <select id="difficulty-select" class="config-select">
            <option value="relaxed"></option>
            <option value="normal"></option>
            <option value="brutal"></option>
          </select>
        </div>

        <div class="config-group">
          <label class="config-label" for="detail-select" id="detail-label"></label>
          <select id="detail-select" class="config-select">
            <option value="lush"></option>
            <option value="clean"></option>
          </select>
        </div>

        <div class="config-group">
          <label class="config-label" for="shake-select" id="shake-label"></label>
          <select id="shake-select" class="config-select">
            <option value="on"></option>
            <option value="off"></option>
          </select>
        </div>
      </article>

      <article class="sigil-card">
        <div class="sigil-copy">
          <p class="section-kicker" id="sigil-kicker"></p>
          <h2 id="sigil-title"></h2>
          <p id="sigil-body"></p>
        </div>
        <div class="sigil-art" aria-hidden="true">
          <svg viewBox="0 0 240 240" role="presentation">
            <defs>
              <linearGradient id="bladeGradient" x1="0%" x2="100%">
                <stop offset="0%" stop-color="#ffe7a2" />
                <stop offset="100%" stop-color="#c7823a" />
              </linearGradient>
              <linearGradient id="woodGradient" x1="0%" x2="100%">
                <stop offset="0%" stop-color="#8f4f29" />
                <stop offset="100%" stop-color="#4d2413" />
              </linearGradient>
            </defs>
            <circle cx="120" cy="120" r="98" fill="rgba(255,210,140,0.08)" stroke="rgba(255,218,157,0.16)" stroke-width="2" />
            <path d="M121 48c36 12 58 48 49 84-7 27-28 48-57 57 19-15 30-31 35-47 6-18 3-37-9-55-5-8-11-15-18-21z" fill="url(#bladeGradient)" stroke="#f8deb2" stroke-width="4" stroke-linejoin="round" />
            <path d="M88 176l22-28 53-72" stroke="url(#woodGradient)" stroke-width="14" stroke-linecap="round" />
            <path d="M82 165l15 11" stroke="#f4cf89" stroke-width="5" stroke-linecap="round" />
            <path d="M60 88c12 19 18 42 17 67" stroke="#f4cf89" stroke-width="5" stroke-linecap="round" />
            <path d="M54 101l-18-7M55 121l-20 1M56 142l-16 9" stroke="#f4cf89" stroke-width="4" stroke-linecap="round" />
            <path d="M179 92c-12 19-18 42-17 67" stroke="#f4cf89" stroke-width="5" stroke-linecap="round" />
            <path d="M185 105l18-7M184 125l20 1M183 145l16 9" stroke="#f4cf89" stroke-width="4" stroke-linecap="round" />
          </svg>
        </div>
      </article>
    </section>
  </main>
  <script src="./game.js"></script>
</body>
</html>
